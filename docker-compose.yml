services:
  db:
    image: postgres:16
    container_name: navix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-navix}
      POSTGRES_USER: ${DB_USERNAME:-navix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-navix}
    ports:
      # Aligns with backend DB_URL default: jdbc:postgresql://localhost:5432/navix
      - "5432:5432"
    volumes:
      - navix-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-navix} -d ${DB_NAME:-navix}"]
      interval: 10s
      timeout: 5s
      retries: 3

  adminer:
    image: adminer:latest
    container_name: navix-adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  navix-pgdata:
    driver: local
