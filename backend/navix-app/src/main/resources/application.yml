server:
  port: 8080

spring:
  application:
    name: navix-finance
  # Load config + secrets from AWS SSM Parameter Store. `optional:` lets the app
  # still start without AWS (local fallback to env vars / defaults below).
  # Parameters under /navix/<env>/ map to properties, e.g.
  #   /navix/dev/spring/datasource/password  ->  spring.datasource.password
  config:
    import: optional:aws-parameterstore:/navix/${NAVIX_ENV:dev}/
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-south-1}
      # Credentials come from the DEFAULT provider chain: ECS task role in prod,
      # your AWS_PROFILE / env vars locally. Never hardcode access keys.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/navix}
    username: ${DB_USERNAME:navix}
    password: ${DB_PASSWORD:navix}
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates against it.
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# NAVIX integration settings
navix:
  fintrix:
    base-url: ${FINTRIX_BASE_URL:https://admin.fintrix.tech/__api/api/v1/}
    client-id: ${FINTRIX_CLIENT_ID:}
    client-secret: ${FINTRIX_CLIENT_SECRET:}
  digilocker:
    base-url: ${DIGILOCKER_BASE_URL:https://admin.fintrix.tech/__api/api/v1/}
    client-id: ${DIGILOCKER_CLIENT_ID:}
    client-secret: ${DIGILOCKER_CLIENT_SECRET:}
  storage:
    # S3 bucket for documents/images (KYC, loan docs, payment & collections proofs).
    bucket: ${NAVIX_S3_BUCKET:navix-finance-documents-dev}
    # Presigned-URL validity in seconds (default 15 min).
    presign-ttl-seconds: ${NAVIX_S3_PRESIGN_TTL:900}
    # Optional KMS key (ARN/alias) for server-side puts; bucket default encryption
    # otherwise applies. Leave blank to use the bucket default.
    kms-key-id: ${NAVIX_S3_KMS_KEY_ID:}

  # Borrower OTP delivery via the UltronSMS gateway. The doc demo creds are placeholders
  # ("username or password is invalid") — set real NAVIX_SMS_USER/PASSWORD or NAVIX_SMS_API_KEY.
  sms:
    base-url: ${NAVIX_SMS_BASE_URL:https://ultronsms.com/api/mt/}
    user: ${NAVIX_SMS_USER:demo}
    password: ${NAVIX_SMS_PASSWORD:demo123}
    api-key: ${NAVIX_SMS_API_KEY:}
    sender-id: ${NAVIX_SMS_SENDER_ID:WEBSMS}
    # Promo | Trans. OTP is transactional; the route/peid/dlt-template-id are India-DLT params.
    channel: ${NAVIX_SMS_CHANNEL:Trans}
    route: ${NAVIX_SMS_ROUTE:}
    peid: ${NAVIX_SMS_PEID:}
    dlt-template-id: ${NAVIX_SMS_DLT_TEMPLATE_ID:}
    enabled: ${NAVIX_SMS_ENABLED:true}
    # DEV ONLY — returns the OTP in the request response when SMS can't reach a handset. MUST be false in prod.
    dev-echo: ${NAVIX_SMS_DEV_ECHO:false}
    otp-ttl-seconds: ${NAVIX_SMS_OTP_TTL:300}
    otp-length: ${NAVIX_SMS_OTP_LENGTH:6}

# API documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
