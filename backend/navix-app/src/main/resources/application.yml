server:
  port: 8080

spring:
  application:
    name: navix-finance
  # Load config + secrets from AWS SSM Parameter Store. `optional:` lets the app
  # still start without AWS (local fallback to env vars / defaults below).
  # Parameters under /navix/<env>/ map to properties, e.g.
  #   /navix/dev/spring/datasource/password  ->  spring.datasource.password
  config:
    import: optional:aws-parameterstore:/navix/${NAVIX_ENV:dev}/
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-south-1}
      # Credentials come from the DEFAULT provider chain: ECS task role in prod,
      # your AWS_PROFILE / env vars locally. Never hardcode access keys.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/navix}
    username: ${DB_USERNAME:navix}
    password: ${DB_PASSWORD:navix}
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates against it.
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Logging — the appender/pattern live in logback-spring.xml (CloudWatch-friendly, MDC-aware).
# Only the com.navix level is set here so ops can raise it to DEBUG in ECS via NAVIX_LOG_LEVEL
# (env var) without a redeploy of the logback config. Framework loggers are tamed in the xml.
logging:
  level:
    com.navix: ${NAVIX_LOG_LEVEL:INFO}

# NAVIX integration settings
navix:
  # Opt-in demo fixture: when set, every Experian bureau pull returns this bundled report instead of
  # calling Fintrix (the live sandbox is thin-file). Use classpath:samplepan.json or an absolute path
  # to see a rich credit brief + rating locally. Leave blank in real environments.
  bureau:
    fixture: ${NAVIX_BUREAU_FIXTURE:}
  fintrix:
    base-url: ${FINTRIX_BASE_URL:https://admin.fintrix.tech/__api/api/v1/}
    client-id: ${FINTRIX_CLIENT_ID:}
    client-secret: ${FINTRIX_CLIENT_SECRET:}
  digilocker:
    base-url: ${DIGILOCKER_BASE_URL:https://admin.fintrix.tech/__api/api/v1/}
    client-id: ${DIGILOCKER_CLIENT_ID:}
    client-secret: ${DIGILOCKER_CLIENT_SECRET:}
  storage:
    # S3 bucket for documents/images (KYC, loan docs, payment & collections proofs).
    bucket: ${NAVIX_S3_BUCKET:navix-finance-documents-dev}
    # Presigned-URL validity in seconds (default 15 min).
    presign-ttl-seconds: ${NAVIX_S3_PRESIGN_TTL:900}
    # Optional KMS key (ARN/alias) for server-side puts; bucket default encryption
    # otherwise applies. Leave blank to use the bucket default.
    kms-key-id: ${NAVIX_S3_KMS_KEY_ID:}

  # Auth tokens (HS256 JWT). secret is SHA-256'd into the HMAC key. Borrowers get a longer TTL
  # (7-day "remember me"); staff keep the shorter one. Set a strong AUTH_SECRET in real environments.
  auth:
    secret: ${AUTH_SECRET:navix-local-dev-secret-change-me}
    ttl-seconds: ${AUTH_TTL_SECONDS:86400}
    borrower-ttl-seconds: ${BORROWER_AUTH_TTL_SECONDS:604800}

  # App-level URLs. frontend-base-url builds the password-reset links carried in emails.
  app:
    frontend-base-url: ${NAVIX_APP_BASE_URL:http://localhost:3000}

  # Daily payment-reminder sweep (PaymentReminderScheduler). Spring cron: sec min hour dom mon dow.
  reminders:
    cron: ${NAVIX_REMINDERS_CRON:0 0 9 * * *}

  # Refer-a-friend program. enabled gates the whole feature; reward-paise is the per-person reward
  # (₹200 = 20000 paise). Read at boot — override per env via the SSM params
  # /navix/<env>/navix/referral/{enabled,reward-paise} (a change needs a restart/redeploy).
  referral:
    enabled: ${NAVIX_REFERRAL_ENABLED:true}
    reward-paise: ${NAVIX_REFERRAL_REWARD_PAISE:20000}

  # Borrower OTP delivery via the UltronSMS gateway. The doc demo creds are placeholders
  # ("username or password is invalid") — set real NAVIX_SMS_USER/PASSWORD or NAVIX_SMS_API_KEY.
  sms:
    base-url: ${NAVIX_SMS_BASE_URL:https://ultronsms.com/api/mt/}
    user: ${NAVIX_SMS_USER:demo}
    password: ${NAVIX_SMS_PASSWORD:demo123}
    api-key: ${NAVIX_SMS_API_KEY:}
    sender-id: ${NAVIX_SMS_SENDER_ID:WEBSMS}
    # Promo | Trans. OTP is transactional; the route/peid/dlt-template-id are India-DLT params.
    channel: ${NAVIX_SMS_CHANNEL:Trans}
    route: ${NAVIX_SMS_ROUTE:}
    peid: ${NAVIX_SMS_PEID:}
    dlt-template-id: ${NAVIX_SMS_DLT_TEMPLATE_ID:}
    # DLT-registered OTP message ({otp} = code, {ttl} = minutes). MUST match a template
    # registered for the sender or the gateway returns "Invalid template text".
    otp-template: ${NAVIX_SMS_OTP_TEMPLATE:Your NAVIX verification code is {otp}. Valid for {ttl} minutes. Do not share it.}
    enabled: ${NAVIX_SMS_ENABLED:true}
    # DEV ONLY — returns the OTP in the request response when SMS can't reach a handset. MUST be false in prod.
    dev-echo: ${NAVIX_SMS_DEV_ECHO:false}
    otp-ttl-seconds: ${NAVIX_SMS_OTP_TTL:300}
    otp-length: ${NAVIX_SMS_OTP_LENGTH:6}
    # DEMO/TESTING — when true, a fixed mock-code always verifies and NO SMS is sent (no DLT needed).
    # MUST be false in production. Set NAVIX_SMS_MOCK=true to use OTP 123456 for testing.
    mock: ${NAVIX_SMS_MOCK:false}
    mock-code: ${NAVIX_SMS_MOCK_CODE:123456}

  # Notification engine (in-app + SMS + email). Delivery is mock/log by default (mirrors the SMS-mock
  # philosophy): in-app is fully persisted, SMS reuses the gateway (mock-aware), and email logs via
  # LogEmailClient. Flip email to real SMTP with NAVIX_EMAIL_PROVIDER=smtp + spring.mail.* configured.
  email:
    provider: ${NAVIX_EMAIL_PROVIDER:log}      # log | smtp | ses | resend
    enabled: ${NAVIX_EMAIL_ENABLED:true}
    from: ${NAVIX_EMAIL_FROM:NAVIX Finance <no-reply@navixfinance.example>}
    # SES only: tag sends with a SES configuration set so bounce/complaint events fire to SNS->SQS.
    configuration-set: ${NAVIX_SES_CONFIG_SET:}
    # Resend only: API key for the Resend HTTP provider (interim while SES is sandbox-blocked).
    resend-api-key: ${RESEND_API_KEY:}
  # SES bounce/complaint ingestion (SES config-set -> SNS -> SQS -> SesEventSqsListener). Off by
  # default so the app boots without an SQS queue; flip on in AWS environments.
  ses:
    events:
      enabled: ${NAVIX_SES_EVENTS_ENABLED:false}
      queue: ${NAVIX_SES_EVENTS_QUEUE:navix-ses-events}
  notifications:
    async:
      core-pool-size: ${NAVIX_NOTIF_CORE_POOL:2}
      max-pool-size: ${NAVIX_NOTIF_MAX_POOL:8}
      queue-capacity: ${NAVIX_NOTIF_QUEUE:500}

# API documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
